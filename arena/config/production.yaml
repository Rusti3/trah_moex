    - selector_nrh_00106
    - selector_nrh_00204
  min_history_intervals: 6

live_selector:
  mode: lightgbm_rank_weighted
  min_train_intervals: 48
  train_lookback_intervals: 512
  lightgbm_estimators: 60
  fallback: rolling_rank_weighted_w24_p2

history_bootstrap:
  initial_intervals: 48
  background_intervals: 512
  time_budget_seconds: 180

logging:
  news_log_interval_seconds: 1800
  health_log_interval_seconds: 300
  log_level: info
  log_stdout: true
  log_full_payloads: false

universe:
  tickers:
    - LKOH
    - SBER
    - ROSN
    - GAZP
    - VTBR
    - YDEX
    - PLZL
    - T
    - NVTK
    - X5
    - GMKN
    - MGNT
    - ALRS
    - AFLT
    - CHMF
    - NLMK
    - MOEX
    - SNGSP
    - MTSS
    - PIKK

rebalance:
  decision_interval_minutes: 30
  decision_delay_seconds: 5
  precompute_seconds: 120
  candle_close_wait_seconds: 5
  execution_deadline_seconds: 90
  expected_latency_minutes: 1.0
  max_kronos_wait_seconds: 300
  target_time_flow:
    - candle_closed
    - async_kronos_forecast
    - async_llm_news_scoring
    - async_moex_cost_depth
    - rolling_rank_weighted_selector
    - order_targets

risk:
  max_gross_exposure: 1.0
  allow_long: true
  allow_short: true
  default_llm_score_when_missing: 0.5
  require_no_long_short_overlap_per_ticker: true
  max_daily_trades: 950
  min_order_value_rub: 100

environment:
  polza_api_key_env: POLZA_AI_API_KEY
  moex_algo_token_env: MOEX_ALGO_TOKEN
  arenago_api_key_env: SANDBOX_API_KEY
  secrets_policy: do_not_store_keys_in_repo_or_csv

lot_sizes:
  GAZP: 10
  GMKN: 10
  ALRS: 10
  AFLT: 10
  NLMK: 10
  MOEX: 10
  SNGSP: 10
  MTSS: 10

